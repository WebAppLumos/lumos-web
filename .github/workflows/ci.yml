name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
          VITE_FIREBASE_APP_ID: 1:123456789012:web:placeholder
          VITE_FIREBASE_MEASUREMENT_ID: G-PLACEHOLDER
          VITE_KAKAO_MAP_APP_KEY: ci-placeholder
